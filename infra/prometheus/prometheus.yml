global:
  scrape_interval: 15s # Pull metrics from targets every 15 seconds
  evaluation_interval: 15s # Evaluate alerting rules every 15 seconds

scrape_configs:
  - job_name: 'envsync-backend'
    # 'backend' resolves to the backend container on the Docker Compose network.
    # If METRICS_SECRET is set on the backend, uncomment the authorization block below
    # and set credentials to the same value so Prometheus can scrape the endpoint.
    static_configs:
      - targets: ['backend:3001']
    metrics_path: '/metrics'
    # authorization:
    #   credentials: <your-METRICS_SECRET-value>
