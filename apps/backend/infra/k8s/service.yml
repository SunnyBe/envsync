apiVersion: v1
kind: Service
metadata:
  name: envsync-backend
  namespace: envsync
spec:
  type: ClusterIP # Internal only - not accessible from outside
  selector:
    app: envsync-backend # Send traffic to pods with this label (matches our deployment label)
  ports:
    - port: 80 # Port the service listens on (inside the cluster)
      targetPort: 3001 # Port the container is running on
