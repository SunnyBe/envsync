# Default values for envsync chart.
replicaCount: 2

image:
  repository: envsync-backend
  tag: local
  pullPolicy: Never # Other options: Always, IfNotPresent

config:
  nodeEnv: development
  targetPort: 3001
  allowedOrigins: http://localhost:3000
  healthSecret: test-health-secret

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi
ingress:
  enabled: false
  host: envsync.local

postgresql:
  auth:
    username: envsync
    database: envsync-db
    # password is NOT stored here — provide it via an existing K8s Secret.
    # For local dev: kubectl create secret generic envsync-postgresql \
    #   --namespace <your-namespace> --from-literal=password=envsync
    # For production: create the secret imperatively on the cluster before deploying.
    existingSecret: envsync-postgresql
    secretKeys:
      userPasswordKey: password
  primary:
    service:
      ports:
        postgresql: 5432
