apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}
spec:
  type: LoadBalancer # GCP provisions an external load balancer with a public IP
  selector:
    app: {{ .Release.Name }} # Send traffic to pods with this label (matches our deployment label)
  ports:
    - name: http
      port: 80 # Port the service listens on (inside the cluster)
      targetPort: {{ .Values.config.targetPort }} # Port the container is running on
