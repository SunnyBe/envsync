services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: envsync
      POSTGRES_PASSWORD: envsync
      POSTGRES_DB: envsync
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://envsync:envsync@db:5432/envsync
      ENV_SYNC_SECRET: ${ENV_SYNC_SECRET}
      PORT: 3001
    depends_on:
      - db

volumes:
  postgres_data:
