services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-envsync}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-envsync}
      POSTGRES_DB: envsync
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    ports:
      - '3001:3001'
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-envsync}:${POSTGRES_PASSWORD:-envsync}@db:5432/envsync
      ENV_SYNC_SECRET: ${ENV_SYNC_SECRET}
      METRICS_SECRET: ${METRICS_SECRET:-}
      HEALTH_SECRET: ${HEALTH_SECRET:-}
      PORT: 3001
    depends_on:
      - db

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3001
    ports:
      - '3000:3000'
    depends_on:
      - backend

  prometheus:
    image: prom/prometheus:v2.51.0
    volumes:
      - ./infra/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/observability/prometheus/rules.yml:/etc/prometheus/rules.yml:ro
      - prometheus_data:/prometheus
    environment:
      METRICS_SECRET: ${METRICS_SECRET:-}
    ports:
      - '9090:9090'
    depends_on:
      - backend
    # Prometheus config uses credentials_file, not env vars — write the value
    # from the environment into a file at startup, then hand off to Prometheus.
    entrypoint:
      - /bin/sh
      - -c
      - |
        printf '%s' "$$METRICS_SECRET" > /etc/prometheus/metrics_secret
        exec /bin/prometheus \
          --config.file=/etc/prometheus/prometheus.yml \
          --storage.tsdb.path=/prometheus \
          --storage.tsdb.retention.time=7d

  grafana:
    image: grafana/grafana:10.4.0
    ports:
      - '3002:3000'
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: 'false'
    volumes:
      - ./infra/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
