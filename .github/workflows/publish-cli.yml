name: Publish CLI to npm

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — build and pack without publishing'
        required: false
        default: false
        type: boolean

jobs:
  publish:
    name: Publish @ndusunday/envsync
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build CLI
        run: npm run rebuild --workspace=apps/cli

      - name: Run tests
        run: npm test --workspace=apps/cli

      - name: Verify npm token is set
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "::error::NPM_TOKEN secret is not set. Add it in Settings → Secrets → Actions."
            exit 1
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm
        working-directory: apps/cli
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "Dry run — skipping publish"
            npm pack
          else
            npm publish --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
