name: CI

on:
  push:
    branches: [main]
    tags: ['v*'] # e.g. v1.0.0, v2.1.3 — triggers the publish job
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Lint backend
        run: npm run lint --workspace=apps/backend

      - name: Lint web
        run: npm run lint --workspace=apps/web

      - name: Test backend
        run: npm test --workspace=apps/backend
        env:
          # Fallback is a dummy 64-char hex string used only for CI test runs.
          # Set secrets.ENV_SYNC_SECRET in GitHub Settings → Secrets for production deploys.
          ENV_SYNC_SECRET: ${{ secrets.ENV_SYNC_SECRET || 'aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa' }}
          HEALTH_SECRET: test-health-secret

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build backend
        run: npm run build --workspace=apps/backend

      - name: Build web
        run: npm run build --workspace=apps/web

      - name: Docker build (backend)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/backend/Dockerfile
          push: false

      - name: Docker build (web)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: false

  publish:
    name: Publish Docker image
    runs-on: ubuntu-latest
    needs: build
    # Push on merges to main (SHA tag) or when a version tag is pushed (semver tags)
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: read
      packages: write # Required to push to GitHub Container Registry

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          # GITHUB_TOKEN is automatically provided — no manual secret needed
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract backend image metadata (tags + labels)
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/envsync-backend
          tags: |
            # On every merge to main: tag with short git SHA for exact traceability
            type=sha,format=short
            # On release tags (v1.0.0): produce clean semver tags
            type=semver,pattern={{version}}       # → 1.0.0
            type=semver,pattern={{major}}.{{minor}} # → 1.0
            # 'latest' always points to the most recent main/release build
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/backend/Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}

      - name: Extract web image metadata (tags + labels)
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/envsync-web
          tags: |
            type=sha,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}

  migrate:
    name: Run DB migrations
    runs-on: ubuntu-latest
    needs: publish
    # Only run on pushes to main (not PRs, not version tags — Railway auto-deploys handle tags)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run Prisma migrations
        run: npx prisma migrate deploy
        working-directory: apps/backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
