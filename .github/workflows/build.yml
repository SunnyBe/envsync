name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Lint backend
        run: npm run lint --workspace=apps/backend

      - name: Lint web
        run: npm run lint --workspace=apps/web

      - name: Test backend
        run: npm test --workspace=apps/backend
        env:
          # Fallback is a dummy 64-char hex string used only for CI test runs.
          # Set secrets.ENV_SYNC_SECRET in GitHub Settings → Secrets for production deploys.
          ENV_SYNC_SECRET: ${{ secrets.ENV_SYNC_SECRET || 'aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa' }}
          HEALTH_SECRET: test-health-secret

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build backend
        run: npm run build --workspace=apps/backend

      - name: Build web
        run: npm run build --workspace=apps/web

      - name: Docker build (backend)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/backend/Dockerfile
          push: false

      - name: Docker build (web)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: false
